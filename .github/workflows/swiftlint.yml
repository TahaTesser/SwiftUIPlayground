name: SwiftLint

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  swiftlint:
    name: SwiftLint
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Check out repostory
        uses: actions/checkout@v6

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --config .swiftlint.yml --baseline .swiftlint.baseline --reporter github-actions-logging --strict
